# ============================================================
# fairfaretransportation.app - FairFare Backend (API)
# TEMPORARY VERSION: Without SSL for api subdomain (for testing)
# Use this ONLY if you need to test before getting SSL certificate
# ============================================================

# ============================================================
# ROOT DOMAIN: fairfaretransportation.app
# ============================================================

# 1) HTTP -> HTTPS (Root Domain)
server {
    if ($host = www.fairfaretransportation.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = fairfaretransportation.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;

    server_name fairfaretransportation.app www.fairfaretransportation.app;

    return 301 https://$host$request_uri;
}

# 2) HTTPS - Root Domain API (Fixed to preserve /api path)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name fairfaretransportation.app www.fairfaretransportation.app;

    ssl_certificate /etc/letsencrypt/live/fairfaretransportation.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/fairfaretransportation.app/privkey.pem; # managed by Certbot
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Fixed: Preserve /api path when proxying
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;  # Added /api/ to preserve path
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # convenience endpoint (optional)
    location = /health {
        proxy_pass http://127.0.0.1:8001/api/health;  # Updated path
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# API SUBDOMAIN: api.fairfaretransportation.app
# TEMPORARY: HTTP only (no SSL) - Use this ONLY for testing
# ============================================================

# 3) HTTP - API Subdomain (Temporary - no HTTPS redirect)
server {
    listen 80;
    listen [::]:80;

    server_name api.fairfaretransportation.app;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/api-fairfaretransportation-access.log;
    error_log /var/log/nginx/api-fairfaretransportation-error.log;

    # Proxy all requests to backend with /api prefix
    # Request: api.fairfaretransportation.app/users/register
    # Proxies to: http://127.0.0.1:8001/api/users/register
    location / {
        proxy_pass http://127.0.0.1:8001/api;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $server_name;

        # CORS headers (backup, Flask-CORS should handle this)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location = /health {
        proxy_pass http://127.0.0.1:8001/api/health;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ============================================================
# AFTER TESTING: Get SSL certificate and use the full config
# Run: sudo certbot --nginx -d api.fairfaretransportation.app
# Then replace this file with nginx-fairfaretransportation-updated.conf
