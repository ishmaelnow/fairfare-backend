# Nginx Configuration for api.fairfaretransportation.app
# Place this file at: /etc/nginx/sites-available/api-fairfaretransportation

server {
    listen 80;
    server_name api.fairfaretransportation.app;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.fairfaretransportation.app;

    # SSL Certificate paths (update after running certbot)
    ssl_certificate /etc/letsencrypt/live/api.fairfaretransportation.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fairfaretransportation.app/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/api-fairfaretransportation-access.log;
    error_log /var/log/nginx/api-fairfaretransportation-error.log;

    # Proxy to Flask backend (Gunicorn)
    location /api {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # CORS headers (if needed, though Flask-CORS should handle this)
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8001/api/health;
        proxy_set_header Host $host;
    }

    # Default location - return 404 for root
    location / {
        return 404;
    }
}

