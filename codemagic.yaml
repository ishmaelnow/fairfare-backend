    artifacts:
      - driver-pwa/android/app/build/outputs/**/*.apk

  rider-ios:
    name: FairFare Rider iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: mobile
          include: true
    environment:
      groups:
        - fairfare-production
        - app-store-connect
      vars:
        APP_DIR: rider-pwa
        XCODE_WORKSPACE: rider-pwa/ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22.12.0
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: codemagic
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor iOS
        script: cd "$APP_DIR" && npx cap sync ios
      - name: Install CocoaPods
        script: cd "$APP_DIR/ios/App" && pod install
      # iOS signing is handled through the App Store Connect integration plus
      # the certificates/profiles uploaded in Codemagic or matched by use-profiles.
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build signed iOS archive
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa

  driver-ios:
