## Codemagic pipeline for FairFare mobile apps.
## This file is scoped to the `main` Git branch so it tracks the current
## source of truth and does not depend on the legacy `pwas` branch.
workflows:
  rider-android:
    name: FairFare Rider Android
    max_build_duration: 60
    instance_type: linux
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      groups:
        - fairfare-production
      vars:
        APP_DIR: rider-pwa
      node: 22.12.0
      java: 21
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor Android
        script: cd "$APP_DIR" && npx cap sync android
      - name: Build Android release bundle
        script: cd "$APP_DIR/android" && chmod +x ./gradlew && ./gradlew bundleRelease
    artifacts:
      - rider-pwa/android/app/build/outputs/**/*.aab

  rider-android-apk:
