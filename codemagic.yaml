## Debug-only Codemagic pipeline for the rider Android APK on the legacy
## `pwas` branch. Use this if you want to reproduce the older successful
## build path without changing the main pipeline.
workflows:
  rider-android-debug:
    name: FairFare Rider Android Debug APK
    max_build_duration: 60
    instance_type: linux
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: pwas
          include: true
    environment:
      groups:
        - fairfare-production
      vars:
        APP_DIR: rider-pwa
      node: 22.12.0
      java: 21
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor Android
        script: cd "$APP_DIR" && npx cap sync android
      - name: Build Android debug APK
        script: cd "$APP_DIR/android" && chmod +x ./gradlew && ./gradlew assembleDebug
    artifacts:
      - rider-pwa/android/app/build/outputs/apk/debug/*.apk
