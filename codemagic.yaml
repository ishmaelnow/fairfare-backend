workflows:
  rider-android:
    name: FairFare Rider Android
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - fairfare-production
      vars:
        APP_DIR: rider-pwa
      node: 22.12.0
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor Android
        script: cd "$APP_DIR" && npx cap sync android
      - name: Build Android release bundle
        script: cd "$APP_DIR/android" && ./gradlew bundleRelease
    artifacts:
      - rider-pwa/android/app/build/outputs/**/*.aab

  driver-android:
    name: FairFare Driver Android
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - fairfare-production
      vars:
        APP_DIR: driver-pwa
      node: 22.12.0
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor Android
        script: cd "$APP_DIR" && npx cap sync android
      - name: Build Android release bundle
        script: cd "$APP_DIR/android" && ./gradlew bundleRelease
    artifacts:
      - driver-pwa/android/app/build/outputs/**/*.aab

  rider-ios:
    name: FairFare Rider iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - fairfare-production
        - app-store-connect
      vars:
        APP_DIR: rider-pwa
        XCODE_WORKSPACE: rider-pwa/ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22.12.0
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: codemagic
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor iOS
        script: cd "$APP_DIR" && npx cap sync ios
      - name: Install CocoaPods
        script: cd "$APP_DIR/ios/App" && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build signed iOS archive
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa

  driver-ios:
    name: FairFare Driver iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - fairfare-production
        - app-store-connect
      vars:
        APP_DIR: driver-pwa
        XCODE_WORKSPACE: driver-pwa/ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22.12.0
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: codemagic
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor iOS
        script: cd "$APP_DIR" && npx cap sync ios
      - name: Install CocoaPods
        script: cd "$APP_DIR/ios/App" && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build signed iOS archive
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
