## Codemagic mobile-store pipeline.
## This file is intentionally scoped to the `mobile` Git branch so it does
## not interfere with the live web production branch `pwas`.
workflows:
  rider-android:
    name: FairFare Rider Android
    max_build_duration: 60
    instance_type: linux
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: mobile
          include: true
    environment:
      groups:
        - fairfare-production
      vars:
        APP_DIR: rider-pwa
      node: 22.12.0
      java: 21
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor Android
        script: cd "$APP_DIR" && npx cap sync android
      # Android signing values should be added in Codemagic UI or the
      # `fairfare-production` environment group before this step runs.
      # Typical inputs: keystore file, keystore password, key alias, key password.
      - name: Build Android release bundle
        script: cd "$APP_DIR/android" && chmod +x ./gradlew && ./gradlew bundleRelease
    artifacts:
      - rider-pwa/android/app/build/outputs/**/*.aab

  rider-android-apk:
    name: FairFare Rider Android APK
    max_build_duration: 60
    instance_type: linux
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: mobile
          include: true
    environment:
      groups:
        - fairfare-production
      vars:
        APP_DIR: rider-pwa
      node: 22.12.0
      java: 21
    scripts:
      - name: Install web dependencies
        script: cd "$APP_DIR" && npm install --legacy-peer-deps
      - name: Build web app for mobile
        script: cd "$APP_DIR" && npm run build:mobile
      - name: Sync Capacitor Android
        script: cd "$APP_DIR" && npx cap sync android
      # Android signing values should be added in Codemagic UI or the
      # `fairfare-production` environment group before this step runs.
      # Typical inputs: keystore file, keystore password, key alias, key password.
      - name: Build Android release APK
        script: cd "$APP_DIR/android" && chmod +x ./gradlew && ./gradlew assembleRelease
    artifacts:
      - rider-pwa/android/app/build/outputs/**/*.apk

